# ─── Nginx конфігурація — reverse proxy перед Flask/Gunicorn ───────────────

upstream flask_app {
    server app:5000;          # ім'я сервісу з docker-compose
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # Розмір тіла запиту (важливо для POST/upload)
    client_max_body_size 10M;

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Проксі до Flask
    location / {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;

        # Передаємо оригінальні заголовки
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Health-check Nginx (для моніторингу)
    location /nginx-health {
        access_log off;
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }
}
