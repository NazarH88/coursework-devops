<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Demo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #141720;
      --border: #1f2433;
      --accent: #4fffb0;
      --accent2: #7b61ff;
      --text: #e8eaf0;
      --muted: #5a6075;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 780px;
      width: 100%;
    }

    /* Header */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(79,255,176,0.08);
      border: 1px solid rgba(79,255,176,0.25);
      border-radius: 999px;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease both;
    }

    .badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 3rem;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    /* Cards grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .card {
      background: var(--surface);
      padding: 1.5rem;
      transition: background 0.2s;
    }
    .card:hover { background: #1a1e2e; }

    .card-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .card-value {
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--accent);
      font-weight: 700;
      word-break: break-all;
    }

    /* Endpoint list */
    .endpoints {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.5s 0.4s ease both;
    }

    .endpoint-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .endpoint {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.82rem;
      transition: background 0.15s;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }
    .endpoint:last-child { border-bottom: none; }
    .endpoint:hover { background: #1a1e2e; }

    .method {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      background: rgba(79,255,176,0.12);
      color: var(--accent);
      letter-spacing: 0.05em;
      min-width: 42px;
      text-align: center;
    }

    .ep-path { flex: 1; color: var(--text); }
    .ep-desc { color: var(--muted); font-size: 0.75rem; }

    .arrow {
      color: var(--muted);
      font-size: 0.8rem;
      transition: transform 0.2s, color 0.2s;
    }
    .endpoint:hover .arrow { transform: translateX(4px); color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">LIVE &nbsp;·&nbsp; ENV: {{ env | upper }}</div>

    <h1>DevOps<br><span>Demo App</span></h1>
    <p class="subtitle">Flask · Docker · Nginx · Jenkins CI/CD</p>

    <div class="grid">
      <div class="card">
        <div class="card-label">Version</div>
        <div class="card-value">v{{ version }}</div>
      </div>
      <div class="card">
        <div class="card-label">Environment</div>
        <div class="card-value">{{ env }}</div>
      </div>
      <div class="card">
        <div class="card-label">Stack</div>
        <div class="card-value">Python / Flask</div>
      </div>
      <div class="card">
        <div class="card-label">Proxy</div>
        <div class="card-value">Nginx</div>
      </div>
    </div>

    <div class="endpoints">
      <div class="endpoint-header">Available endpoints</div>
      <a class="endpoint" href="/">
        <span class="method">GET</span>
        <span class="ep-path">/</span>
        <span class="ep-desc">Головна сторінка</span>
        <span class="arrow">→</span>
      </a>
      <a class="endpoint" href="/api/health">
        <span class="method">GET</span>
        <span class="ep-path">/api/health</span>
        <span class="ep-desc">Health-check</span>
        <span class="arrow">→</span>
      </a>
      <a class="endpoint" href="/api/info">
        <span class="method">GET</span>
        <span class="ep-path">/api/info</span>
        <span class="ep-desc">Інфо про додаток</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
