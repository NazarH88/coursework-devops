services:

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime

    container_name: flask_app

    restart: unless-stopped

    environment:
      APP_ENV: production
      APP_VERSION: "1.0.0"
      PORT: "5000"

    expose:
      - "5000"

    networks:
      - app-network

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine

    container_name: nginx_proxy

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      app:
        condition: service_healthy

    networks:
      - app-network

networks:
  app-network:
    driver: bridge
