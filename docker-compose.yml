version: "3.9"

# ─── Мережа для ізоляції сервісів ──────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─── Сервіси ───────────────────────────────────────────────────────────────
services:

  # Flask-додаток (Gunicorn)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime           # використовуємо тільки production-stage
    container_name: flask_app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_VERSION: "1.0.0"
      PORT: "5000"
    expose:
      - "5000"                  # порт видимий тільки всередині мережі
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Nginx — reverse proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"                 # зовнішній доступ тільки через nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      app:
        condition: service_healthy  # nginx стартує лише після healthy Flask
